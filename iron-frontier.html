<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>IRON FRONTIER VR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script>
AFRAME.registerComponent('gonzo-move', {
  schema: { speed: { default: 5 }, turnSnap: { default: 30 } },
  init() {
    this.vel = { x: 0, z: 0 };
    this.rightX = 0;
    this.canSnap = true;
    this.yaw = 0;
    this.el.sceneEl.addEventListener('loaded', () => {
      const lc = document.getElementById('lhand');
      const rc = document.getElementById('rhand');
      if (lc) lc.addEventListener('axismove', (e) => {
        const ax = e.detail.axis;
        this.vel.x = Math.abs(ax[0]) > 0.12 ? ax[0] : 0;
        this.vel.z = Math.abs(ax[1]) > 0.12 ? ax[1] : 0;
      });
      if (rc) rc.addEventListener('axismove', (e) => {
        const ax = e.detail.axis;
        this.rightX = Math.abs(ax[0]) > 0.3 ? ax[0] : 0;
      });
    });
  },
  tick(t, dt) {
    if (this.rightX !== 0 && this.canSnap) {
      this.yaw -= Math.sign(this.rightX) * this.data.turnSnap * (Math.PI / 180);
      this.canSnap = false;
    }
    if (this.rightX === 0) this.canSnap = true;
    if (this.vel.x !== 0 || this.vel.z !== 0) {
      const speed = this.data.speed * (dt / 1000);
      const p = this.el.object3D.position;
      p.x += (Math.sin(this.yaw) * -this.vel.z + Math.cos(this.yaw) * this.vel.x) * speed;
      p.z += (Math.cos(this.yaw) * this.vel.z  + Math.sin(this.yaw) * this.vel.x) * speed;
      p.x = Math.max(-30, Math.min(30, p.x));
      p.z = Math.max(-30, Math.min(30, p.z));
    }
    this.el.object3D.rotation.y = this.yaw;
  }
});
</script>
<style>
body{margin:0;background:#0a0500;}
#hud{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;padding:12px 20px;background:linear-gradient(to bottom,rgba(0,0,0,0.8),transparent);pointer-events:none;font-family:'Courier New',monospace;}
.hl{font-size:9px;letter-spacing:3px;color:#7a5522;}.hv{font-size:22px;color:#c9a84c;letter-spacing:2px;}
#tmenu{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;justify-content:center;gap:6px;padding:10px 14px 14px;background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);}
.tb{background:rgba(8,4,0,0.95);border:1px solid #3a2800;color:#c9a84c;padding:8px 12px;font-family:'Courier New',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;text-align:center;min-width:76px;}
.tb.sel,.tb:hover{border-color:#c9a84c;background:rgba(201,168,76,0.12);color:#fff;}
.ti{font-size:15px;margin-bottom:2px;}.tc{font-size:8px;color:#7a5522;margin-top:1px;}

#btitle{font-size:44px;color:#c0431a;letter-spacing:8px;text-shadow:0 0 30px rgba(192,67,26,0.8);}
#bsub{font-size:11px;letter-spacing:4px;color:#c9a84c;margin-top:8px;}
#gameover{position:fixed;inset:0;z-index:300;background:rgba(0,0,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center;font-family:'Courier New',monospace;}
#gameover h1{font-size:52px;color:#c0431a;letter-spacing:8px;}
#gameover p{color:#c9a84c;letter-spacing:3px;margin:14px 0 28px;font-size:12px;}
#gameover button{padding:14px 40px;background:transparent;border:1px solid #c9a84c;color:#c9a84c;font-family:'Courier New',monospace;font-size:12px;letter-spacing:4px;cursor:pointer;}
#info{position:fixed;bottom:78px;left:50%;transform:translateX(-50%);color:#7a5522;font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;pointer-events:none;z-index:50;text-align:center;white-space:nowrap;}
</style>

<script>
// Stars
window.addEventListener('load',()=>{
  const sc=document.getElementById('stars');
  for(let i=0;i<180;i++){
    const s=document.createElement('a-sphere');
    const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*0.4,r=110;
    s.setAttribute('radius',(0.1+Math.random()*0.15).toFixed(2));
    s.setAttribute('position',`${(r*Math.sin(ph)*Math.cos(th)).toFixed(1)} ${(r*Math.cos(ph)+5).toFixed(1)} ${(r*Math.sin(ph)*Math.sin(th)).toFixed(1)}`);
    s.setAttribute('material','color:#ffffff;emissive:#ffffff;emissiveIntensity:1;shader:flat');
    s.setAttribute('segments-width','4');s.setAttribute('segments-height','4');
    sc.appendChild(s);
  }
});

const G={gold:150,lives:5,wave:0,score:0,running:false,waveActive:false,selType:'watchtower',towers:[],enemies:[],projs:[],nE:0,nT:0,nP:0,ac:null};
const TD={watchtower:{cost:40,range:12,dmg:15,rate:1200,col:'#8B6914',h:2.5,r:0.3,pc:'#ffcc44',ps:22},cannon:{cost:80,range:9,dmg:45,rate:2800,col:'#555555',h:1.8,r:0.45,pc:'#888888',ps:16,aoe:2.5},bonfire:{cost:50,range:6,dmg:8,rate:600,col:'#ff6600',h:1.2,r:0.5,pc:'#ff4400',ps:20,slow:true},tesla:{cost:110,range:8,dmg:30,rate:1600,col:'#44aaff',h:3.0,r:0.25,pc:'#88ddff',ps:28,chain:3}};
const ED={raider:{hp:60,spd:3.5,rew:10,col:'#882200',sc:1.0},horseman:{hp:40,spd:6.0,rew:15,col:'#553311',sc:0.85},dynamiter:{hp:80,spd:2.5,rew:18,col:'#664400',sc:1.1},armored:{hp:220,spd:1.8,rew:35,col:'#444444',sc:1.3},boss:{hp:600,spd:1.5,rew:80,col:'#220000',sc:2.0}};
const SPAWNS=[{x:0,z:-55},{x:55,z:0},{x:0,z:55},{x:-55,z:0}];
const DIRS=['NORTH','EAST','SOUTH','WEST'];

function selT(type,btn){G.selType=type;document.querySelectorAll('.tb').forEach(b=>b.classList.remove('sel'));if(btn)btn.classList.add('sel');}

function placeTowerAt(x,z){
  if(!G.running)return;
  const def=TD[G.selType];
  if(G.gold<def.cost){beep(80,0.1);return;}
  if(Math.abs(x)<8&&Math.abs(z)<8){beep(80,0.1);return;}
  for(const t of G.towers){if(Math.sqrt((t.x-x)**2+(t.z-z)**2)<1.5){beep(80,0.1);return;}}
  G.gold-=def.cost;hud();beep(440,0.08);
  const cont=document.getElementById('towers');
  const g=document.createElement('a-entity');g.setAttribute('position',`${x.toFixed(2)} 0 ${z.toFixed(2)}`);
  const base=document.createElement('a-cylinder');base.setAttribute('radius',(def.r+0.15).toFixed(2));base.setAttribute('height','0.15');base.setAttribute('position','0 0.07 0');base.setAttribute('material',`color:#2d1505`);g.appendChild(base);
  const body=document.createElement('a-cylinder');body.setAttribute('radius',def.r.toFixed(2));body.setAttribute('height',def.h.toFixed(2));body.setAttribute('position',`0 ${(def.h/2).toFixed(2)} 0`);body.setAttribute('material',`color:${def.col}`);g.appendChild(body);
  if(G.selType==='bonfire'){const fl=document.createElement('a-cone');fl.setAttribute('radius-bottom',(def.r*0.8).toFixed(2));fl.setAttribute('radius-top','0.02');fl.setAttribute('height','0.7');fl.setAttribute('position',`0 ${(def.h+0.35).toFixed(2)} 0`);fl.setAttribute('material','color:#ff6600;emissive:#cc2200;emissiveIntensity:0.9');fl.setAttribute('animation','property:scale;from:1 1 1;to:0.85 1.15 0.85;dur:220;dir:alternate;loop:true');g.appendChild(fl);}
  if(G.selType==='tesla'){const ring=document.createElement('a-torus');ring.setAttribute('radius','0.4');ring.setAttribute('radius-tubular','0.06');ring.setAttribute('position',`0 ${(def.h+0.1).toFixed(2)} 0`);ring.setAttribute('material','color:#44aaff;emissive:#2266ff;emissiveIntensity:0.8');ring.setAttribute('animation','property:rotation;from:0 0 0;to:0 360 0;dur:2000;loop:true;easing:linear');g.appendChild(ring);}
  if(G.selType==='cannon'){const bar=document.createElement('a-cylinder');bar.setAttribute('radius','0.1');bar.setAttribute('height','0.9');bar.setAttribute('rotation','90 0 0');bar.setAttribute('position',`0 ${(def.h-0.2).toFixed(2)} -0.5`);bar.setAttribute('material','color:#333333');g.appendChild(bar);}
  if(G.selType==='watchtower'){const top=document.createElement('a-box');top.setAttribute('width','0.8');top.setAttribute('height','0.5');top.setAttribute('depth','0.8');top.setAttribute('position',`0 ${(def.h+0.25).toFixed(2)} 0`);top.setAttribute('material','color:#6b4010');g.appendChild(top);}
  cont.appendChild(g);G.towers.push({id:G.nT++,type:G.selType,x,z,def,lastFired:0,el:g});
}

document.addEventListener('DOMContentLoaded',()=>{
  document.querySelector('a-scene').addEventListener('loaded',()=>{
    document.querySelector('.ground').addEventListener('click',e=>{if(e.detail&&e.detail.intersection)placeTowerAt(e.detail.intersection.point.x,e.detail.intersection.point.z);});
    const rhand=document.getElementById('rhand');
    rhand.addEventListener('triggerdown',()=>{
      const rc=rhand.components['raycaster'];if(!rc)return;
      const els=rc.intersectedEls;if(!els.length)return;
      const inter=rc.getIntersection(els[0]);
      if(inter)placeTowerAt(inter.point.x,inter.point.z);
    });
    startGame();setInterval(tick,50);
  });
});

function spawnEnemy(type,x,z){
  const def={...ED[type]},sc=def.sc;
  const g=document.createElement('a-entity');g.setAttribute('position',`${x.toFixed(2)} 0 ${z.toFixed(2)}`);
  const body=document.createElement('a-box');body.setAttribute('width',(0.5*sc).toFixed(2));body.setAttribute('height',(1.0*sc).toFixed(2));body.setAttribute('depth',(0.4*sc).toFixed(2));body.setAttribute('position',`0 ${(0.5*sc).toFixed(2)} 0`);body.setAttribute('material',`color:${def.col}`);g.appendChild(body);
  const head=document.createElement('a-sphere');head.setAttribute('radius',(0.2*sc).toFixed(2));head.setAttribute('position',`0 ${(1.15*sc).toFixed(2)} 0`);head.setAttribute('material',`color:${def.col}`);g.appendChild(head);
  if(type!=='boss'){const hat=document.createElement('a-cylinder');hat.setAttribute('radius',(0.22*sc).toFixed(2));hat.setAttribute('height',(0.25*sc).toFixed(2));hat.setAttribute('position',`0 ${(1.38*sc).toFixed(2)} 0`);hat.setAttribute('material','color:#1a0f00');g.appendChild(hat);}
  const hpbg=document.createElement('a-plane');hpbg.setAttribute('width','0.6');hpbg.setAttribute('height','0.07');hpbg.setAttribute('position',`0 ${(sc*1.9).toFixed(2)} 0`);hpbg.setAttribute('material','color:#330000;shader:flat;side:double');hpbg.setAttribute('look-at','#head');g.appendChild(hpbg);
  const hpf=document.createElement('a-plane');hpf.setAttribute('width','0.6');hpf.setAttribute('height','0.065');hpf.setAttribute('position',`0 ${(sc*1.9+0.003).toFixed(2)} 0`);hpf.setAttribute('material','color:#cc2200;shader:flat;side:double');hpf.setAttribute('look-at','#head');g.appendChild(hpf);
  document.getElementById('enemies').appendChild(g);
  G.enemies.push({id:G.nE++,type,x,z,hp:def.hp,mhp:def.hp,spd:def.spd,rew:def.rew,slow:0,sc,el:g,hpf});
}

function startGame(){G.gold=150;G.lives=5;G.wave=0;G.score=0;G.running=true;G.waveActive=false;['towers','enemies','fx'].forEach(id=>{const c=document.getElementById(id);while(c.firstChild)c.removeChild(c.firstChild);});G.towers=[];G.enemies=[];G.projs=[];G.nE=0;G.nT=0;G.nP=0;document.getElementById('gameover').style.display='none';hud();initAudio();setTimeout(nextWave,3000);}
function nextWave(){if(!G.running)return;G.wave++;document.getElementById('wv').textContent=G.wave;const dir=Math.floor(Math.random()*4);document.getElementById('btitle').textContent='WAVE '+G.wave;document.getElementById('bsub').textContent='RAIDERS FROM THE '+DIRS[dir];const bn=document.getElementById('banner');bn.style.opacity='1';wbeep();setTimeout(()=>{bn.style.opacity='0';spawnWave(G.wave,dir);},2500);}
function getComp(w){if(w<=2)return['raider'];if(w<=4)return['raider','raider','horseman'];if(w<=6)return['raider','horseman','dynamiter'];if(w<=9)return['horseman','dynamiter','armored'];return['dynamiter','armored','boss'];}
function spawnWave(w,dir){G.waveActive=true;const cnt=5+w*2,types=getComp(w),sp=SPAWNS[dir];let i=0;const iv=setInterval(()=>{if(!G.running){clearInterval(iv);return;}if(i>=cnt){clearInterval(iv);return;}const t=types[Math.floor(Math.random()*types.length)];const j=()=>(Math.random()-0.5)*10;spawnEnemy(t,sp.x+j(),sp.z+j());i++;},Math.max(400,800-w*30));}

function tick(){
  if(!G.running)return;const now=Date.now(),dt=0.05;const dead=[];
  for(const e of G.enemies){if(e.hp<=0){dead.push(e);continue;}const spd=e.slow>0?e.spd*0.5:e.spd;if(e.slow>0)e.slow-=dt;const dx=-e.x,dz=-e.z,dist=Math.sqrt(dx*dx+dz*dz);if(dist<3){e.hp=0;G.lives--;hud();beep(60,0.2);if(G.lives<=0){gameOver();return;}dead.push(e);continue;}const nx=dx/dist,nz=dz/dist;e.x+=nx*spd*dt;e.z+=nz*spd*dt;if(e.el){e.el.setAttribute('position',`${e.x.toFixed(3)} 0 ${e.z.toFixed(3)}`);e.el.setAttribute('rotation',`0 ${(Math.atan2(nx,nz)*180/Math.PI).toFixed(1)} 0`);}}
  dead.forEach(e=>{G.enemies=G.enemies.filter(x=>x!==e);if(e.el&&e.el.parentNode)e.el.parentNode.removeChild(e.el);});
  for(const t of G.towers){if(now-t.lastFired<t.def.rate)continue;let cl=null,cd=Infinity;for(const e of G.enemies){if(e.hp<=0)continue;const d=Math.sqrt((e.x-t.x)**2+(e.z-t.z)**2);if(d<t.def.range&&d<cd){cd=d;cl=e;}}if(cl){t.lastFired=now;fireProj(t,cl);}}
  const pd=[];for(const p of G.projs){p.x+=p.vx*dt;p.z+=p.vz*dt;p.life-=dt;if(p.el)p.el.setAttribute('position',`${p.x.toFixed(3)} ${p.y} ${p.z.toFixed(3)}`);let hit=false;for(const e of G.enemies){if(e.hp<=0)continue;if(Math.sqrt((e.x-p.x)**2+(e.z-p.z)**2)<0.8){if(p.aoe){for(const e2 of G.enemies){if(Math.sqrt((e2.x-p.x)**2+(e2.z-p.z)**2)<p.aoe)dmg(e2,p.d);}boom(p.x,p.z);}else if(p.ch){let tg=[e];for(const e2 of G.enemies){if(tg.length>=p.ch||e2===e||e2.hp<=0)continue;if(Math.sqrt((e2.x-e.x)**2+(e2.z-e.z)**2)<4)tg.push(e2);}tg.forEach(x=>dmg(x,p.d));}else{dmg(e,p.d);if(p.sl)e.slow=2.0;}hit=true;pd.push(p);break;}}if(!hit&&p.life<=0)pd.push(p);}
  pd.forEach(p=>{G.projs=G.projs.filter(x=>x!==p);if(p.el&&p.el.parentNode)p.el.parentNode.removeChild(p.el);});
  if(G.waveActive&&G.enemies.length===0){G.waveActive=false;G.gold+=20+G.wave*5;hud();beep(660,0.08);setTimeout(()=>beep(880,0.08),150);setTimeout(nextWave,4000);}
}
function dmg(e,d){e.hp-=d;if(e.hp<=0){G.gold+=e.rew;G.score++;hud();beep(220,0.06);puff(e.x,e.z);return;}const pct=Math.max(0,e.hp/e.mhp);if(e.hpf){e.hpf.setAttribute('width',(0.6*pct).toFixed(3));e.hpf.setAttribute('material',`color:${pct>0.5?'#22cc00':pct>0.25?'#ffaa00':'#cc2200'};shader:flat;side:double`);}}
function fireProj(t,tgt){const dx=tgt.x-t.x,dz=tgt.z-t.z,dist=Math.sqrt(dx*dx+dz*dz),nx=dx/dist,nz=dz/dist,sy=t.def.h-0.3;const el=document.createElement('a-sphere');el.setAttribute('radius',t.type==='cannon'?'0.18':'0.1');el.setAttribute('material',`color:${t.def.pc};emissive:${t.def.pc};emissiveIntensity:0.8;shader:flat`);el.setAttribute('position',`${t.x.toFixed(2)} ${sy} ${t.z.toFixed(2)}`);el.setAttribute('segments-width','5');el.setAttribute('segments-height','4');document.getElementById('fx').appendChild(el);G.projs.push({id:G.nP++,x:t.x,z:t.z,y:sy,vx:nx*t.def.ps,vz:nz*t.def.ps,d:t.def.dmg,life:3,el,aoe:t.def.aoe||null,ch:t.def.chain||null,sl:t.def.slow||null});beep(t.type==='cannon'?80:600,0.05);}
function boom(x,z){const el=document.createElement('a-sphere');el.setAttribute('radius','0.2');el.setAttribute('position',`${x.toFixed(2)} 0.5 ${z.toFixed(2)}`);el.setAttribute('material','color:#ff6600;emissive:#ff3300;emissiveIntensity:1;shader:flat');el.setAttribute('animation','property:scale;from:1 1 1;to:10 10 10;dur:400;easing:easeOutQuad');el.setAttribute('animation__o','property:material.opacity;from:1;to:0;dur:400');document.getElementById('fx').appendChild(el);setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},450);}
function puff(x,z){for(let i=0;i<3;i++){const el=document.createElement('a-sphere');const vx=(Math.random()-0.5)*3,vz=(Math.random()-0.5)*3;el.setAttribute('radius','0.1');el.setAttribute('position',`${x.toFixed(2)} 0.8 ${z.toFixed(2)}`);el.setAttribute('material','color:#cc4400;shader:flat;transparent:true');el.setAttribute('animation',`property:position;from:${x.toFixed(2)} 0.8 ${z.toFixed(2)};to:${(x+vx).toFixed(2)} 0.1 ${(z+vz).toFixed(2)};dur:350`);el.setAttribute('animation__o','property:material.opacity;from:1;to:0;dur:350');document.getElementById('fx').appendChild(el);setTimeout(()=>{if(el.parentNode)el.parentNode.removeChild(el);},400);}}
function hud(){document.getElementById('gv').textContent=G.gold;document.getElementById('wv').textContent=G.wave;document.getElementById('lv').textContent='&#9829;'.repeat(Math.max(0,G.lives))+'&#9825;'.repeat(Math.max(0,5-G.lives));}
function gameOver(){G.running=false;document.getElementById('fs').textContent=`SURVIVED ${G.wave} WAVES`;document.getElementById('gameover').style.display='flex';}
function restartGame(){startGame();}
function initAudio(){if(G.ac)return;G.ac=new(window.AudioContext||window.webkitAudioContext)();}
function beep(freq,vol=0.1){if(!G.ac)return;const o=G.ac.createOscillator(),g=G.ac.createGain();o.connect(g);g.connect(G.ac.destination);o.frequency.value=freq;g.gain.setValueAtTime(vol,G.ac.currentTime);g.gain.linearRampToValueAtTime(0,G.ac.currentTime+0.12);o.start();o.stop(G.ac.currentTime+0.12);}
function wbeep(){if(!G.ac)return;[0,0.1,0.2].forEach((t,i)=>{const o=G.ac.createOscillator(),g=G.ac.createGain();o.connect(g);g.connect(G.ac.destination);o.frequency.value=220+i*110;g.gain.setValueAtTime(0.15,G.ac.currentTime+t);g.gain.linearRampToValueAtTime(0,G.ac.currentTime+t+0.2);o.start(G.ac.currentTime+t);o.stop(G.ac.currentTime+t+0.2);});}
</script>
