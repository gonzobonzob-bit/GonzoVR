<style>
body{margin:0;background:#000;}
#info{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  color:#00ff41;font-family:'Courier New',monospace;font-size:11px;
  letter-spacing:2px;background:rgba(0,0,0,0.7);padding:8px 16px;
  border:1px solid #003300;pointer-events:none;z-index:100;text-align:center;}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:480px;max-width:92vw;background:rgba(3,10,3,0.97);
  border:2px solid #00ff41;padding:24px;display:none;z-index:200;
  font-family:'Courier New',monospace;color:#aaffaa;}
#panel h2{color:#fff;font-size:18px;letter-spacing:2px;margin:8px 0;}
#panel .cid{color:#88ff88;font-size:11px;margin-bottom:4px;}
#panel .cls{color:#ff3333;font-size:11px;margin-bottom:12px;letter-spacing:2px;}
#panel p{font-size:12px;line-height:1.8;margin-bottom:16px;}
#panel button{background:transparent;border:1px solid #00ff41;color:#00ff41;
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;
  padding:10px 24px;cursor:pointer;width:100%;}

<div id="info">LEFT STICK = MOVE &nbsp;·&nbsp; RIGHT STICK = TURN &nbsp;·&nbsp; LOOK AT CARD + RIGHT TRIGGER = READ</div>

<div id="panel">
  <div class="cid" id="p-id"></div>
  <div class="cls" id="p-cls"></div>
  <h2 id="p-title"></h2>
  <div style="height:1px;background:#003300;margin:8px 0 12px"></div>
  <p id="p-sum"></p>
  <button onclick="closePanel()">[ CLOSE FILE ]</button>

<script>
const CASES=[
  {id:"X-File 1013",title:"EUGENE VICTOR TOOMS",cls:"UNNATURAL BIOLOGY",
   sum:"Subject possesses retractable skeletal structure. Hibernates 30-year cycles harvesting human livers. Kill count: 5 per cycle since 1903. DO NOT ENGAGE ALONE."},
  {id:"X-File 1214",title:"THE FLUKEMAN",cls:"PARASITIC ENTITY",
   sum:"Humanoid fluke worm mutation from Chernobyl sewage. Reproduces via larvae deposited through bite. Believed destroyed — unconfirmed. Connection suppressed by DOD."},
  {id:"X-File 0467",title:"BLACK OIL",cls:"EXTRATERRESTRIAL PATHOGEN",
   sum:"Sentient alien organism. Transmitted via ocular contact, full host possession. Found in downed WWII aircraft. Connected to Syndicate colonization agenda."},
  {id:"X-File 7777",title:"COLONIZATION",cls:"CONSPIRACY / EXTRATERRESTRIAL",
   sum:"Planned alien colonization. Syndicate collaborated since Roswell 1947. Smallpox genome catalogued for compatibility. Bees as vectors. Rebel alien resistance exists."},
  {id:"X-File 2231",title:"DUANE BARRY",cls:"ABDUCTION",
   sum:"Former FBI agent. Repeated alien abductions confirmed. Metallic implants — non-terrestrial origin. Barry abducted Scully. Missing 84 days. NO OFFICIAL EXPLANATION."},
  {id:"X-File 3301",title:"PUSHER",cls:"PSI PHENOMENON",
   sum:"Robert Modell imposed will through spoken word — victims complied fatally. Brain tumor source of abilities. Mulder resisted psionic control during confrontation."},
  {id:"X-File 5512",title:"HOME",cls:"HUMAN ABERRATION",
   sum:"Peacock family, Peaceville PA. Severely inbred. Amputee matriarch under floorboards. Infant corpse recovered. Peacocks fled — LOCATION UNKNOWN. File sealed."},
  {id:"X-File 6601",title:"THE SMOKING MAN",cls:"CLASSIFIED",
   sum:"Cancer Man. UFO cover-ups since 1952. JFK assassination suspected. Controls DOD and CIA black budgets. Present at Mulder's father's death. MOTIVE UNKNOWN."},
  {id:"X-File 0001",title:"PILOT — BELLEFLEUR",cls:"INITIAL X-FILE",
   sum:"First case. Four teens dead — radiation burns, anomalous implants. Nine minutes missing time. Evidence incinerated by unknown party. This case opened the X-Files."},
  {id:"X-File 4400",title:"SAMANTHA MULDER",cls:"PERSONAL / UNRESOLVED",
   sum:"Mulder's sister. Abducted November 27 1973, age 8. Government used her as leverage. Multiple clones terminated. Walk-ins theory. CASE REMAINS OPEN."},
  {id:"X-File 9002",title:"JOSE CHUNG",cls:"CONFLICTING ACCOUNTS",
   sum:"Three witnesses. Three different abduction accounts. Men in Black — one NOT human. Lord Kinbote referenced by unconnected sources. Truth: indeterminate."},
];

function openPanel(i){
  const c=CASES[i];
  document.getElementById('p-id').textContent=c.id;
  document.getElementById('p-cls').textContent='⚠ '+c.cls+' ⚠';
  document.getElementById('p-title').textContent=c.title;
  document.getElementById('p-sum').textContent=c.sum;
  document.getElementById('panel').style.display='block';
}
function closePanel(){document.getElementById('panel').style.display='none';}
window.openCase=openPanel;
</script>

<script>
// Thumbstick movement component
AFRAME.registerComponent('thumbstick-move', {
  init: function() {
    this.rig = document.getElementById('rig');
    this.axes = [0, 0];
    this.el.addEventListener('axismove', (e) => {
      this.axes = e.detail.axis;
    });
  },
  tick: function(t, dt) {
    const speed = 3.0 * (dt / 1000);
    const ax = this.axes[0] || 0;
    const ay = this.axes[1] || 0;
    if (Math.abs(ax) < 0.15 && Math.abs(ay) < 0.15) return;
    const cam = document.querySelector('a-camera');
    const yaw = cam ? cam.object3D.rotation.y : 0;
    const rigPos = this.rig.object3D.position;
    rigPos.x += (Math.sin(yaw) * -ay + Math.cos(yaw) * ax) * speed;
    rigPos.z += (Math.cos(yaw) * ay + Math.sin(yaw) * ax) * speed;  // fixed sign
    // Clamp to room
    rigPos.x = Math.max(-4.2, Math.min(4.2, rigPos.x));
    rigPos.z = Math.max(-3.0, Math.min(3.8, rigPos.z));
  }
});

// Right trigger fires raycaster click
document.getElementById('rhand').addEventListener('triggerdown', function() {
  const rc = this.components.raycaster;
  if (!rc) return;
  const els = rc.intersectedEls;
  if (els.length > 0) els[0].click();
});
</script>
