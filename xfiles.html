<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>X-FILES: THE TRUTH IS OUT THERE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:'Courier New',monospace; }
canvas { display:block; }
#overlay {
  position:fixed; inset:0;
  background:#000; color:#00ff41; display:flex; flex-direction:column;
  align-items:center; justify-content:center; z-index:100;
}
#overlay h1 { font-size:42px; letter-spacing:8px; text-shadow:0 0 20px #00ff41; margin-bottom:16px; }
#overlay p { font-size:12px; letter-spacing:4px; color:#005500; margin:4px 0; }
#overlay .start-btn {
  margin-top:30px; padding:14px 40px;
  background:transparent; border:1px solid #00ff41; color:#00ff41;
  font-family:'Courier New',monospace; font-size:13px; letter-spacing:4px;
  cursor:pointer;
}
#overlay .start-btn:hover { background:rgba(0,255,65,0.1); }
#hud {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  color:#00ff41; font-size:10px; letter-spacing:2px; text-align:center;
  pointer-events:none; z-index:50;
  background:rgba(0,0,0,0.7); padding:7px 16px; border:1px solid #003300;
  white-space:nowrap;
}
#case-panel {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:500px; max-width:92vw;
  background:rgba(3,8,3,0.97); border:1px solid #00ff41;
  padding:28px; z-index:200; display:none;
}
#case-panel .cp-hdr { font-size:9px; letter-spacing:5px; color:#00ff41; margin-bottom:10px; }
#case-panel .cp-cls { font-size:11px; color:#ff3333; margin-bottom:10px; letter-spacing:3px; }
#case-panel .cp-id  { font-size:11px; color:#88ff88; margin-bottom:4px; }
#case-panel .cp-ttl { font-size:22px; color:#fff; letter-spacing:2px; margin-bottom:14px; }
#case-panel .cp-div { height:1px; background:#003300; margin-bottom:14px; }
#case-panel .cp-sum { font-size:12px; color:#aaffaa; line-height:1.9; margin-bottom:18px; }
#case-panel .cp-cls2{ font-size:10px; letter-spacing:3px; color:#005500; text-align:center; cursor:pointer; }
#case-panel .cp-cls2:hover { color:#00ff41; }
#xhair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  pointer-events:none; z-index:50; width:14px; height:14px;
}
#xhair::before,#xhair::after{content:'';position:absolute;background:#00ff4188;}
#xhair::before{width:14px;height:1px;top:6px;left:0;}
#xhair::after{width:1px;height:14px;top:0;left:6px;}
</style>
</head>
<body>

<div id="overlay">
  <h1>X-FILES</h1>
  <p>FEDERAL BUREAU OF INVESTIGATION</p>
  <p>CLASSIFIED: EYES ONLY</p>
  <p style="margin-top:8px">SPECIAL AGENT FOX MULDER · BASEMENT OFFICE</p>
  <button class="start-btn" id="startBtn">▶ ENTER BASEMENT</button>
</div>

<div id="xhair"></div>
<div id="hud">WASD = MOVE &nbsp;·&nbsp; MOUSE = LOOK &nbsp;·&nbsp; CLICK CARDS TO READ &nbsp;·&nbsp; ESC = CLOSE</div>

<div id="case-panel">
  <div class="cp-hdr">FEDERAL BUREAU OF INVESTIGATION — CLASSIFIED FILE</div>
  <div class="cp-cls" id="cp-cls"></div>
  <div class="cp-id"  id="cp-id"></div>
  <div class="cp-ttl" id="cp-ttl"></div>
  <div class="cp-div"></div>
  <div class="cp-sum" id="cp-sum"></div>
  <div class="cp-cls2" onclick="closePanel()">[ CLICK TO CLOSE FILE ]</div>
</div>

<script>
// ── CASE DATA ──────────────────────────────────────────────────────────────
const CASES=[
  {id:"X-File 1013",title:"EUGENE VICTOR TOOMS",cls:"UNNATURAL BIOLOGY",sub:"Case 1.03/1.21",col:0xff3333,
   sum:"Subject possesses retractable skeletal structure allowing ingress through small apertures. Hibernates 30-year cycles. Harvests human livers for sustenance. Kill count: 5 per cycle dating back to 1903. DO NOT ENGAGE ALONE."},
  {id:"X-File 1214",title:"THE FLUKEMAN",cls:"PARASITIC ENTITY",sub:"Case 2.02",col:0xff6600,
   sum:"Humanoid fluke worm mutation. Origin: Chernobyl sewage runoff via Black Sea shipping vessel. Reproduces via larvae deposited in human hosts through bite. Believed destroyed — remains unconfirmed. Chernobyl connection suppressed by DOD."},
  {id:"X-File 0467",title:"BLACK OIL",cls:"EXTRATERRESTRIAL PATHOGEN",sub:"Piper Maru / Apocrypha",col:0x9900cc,
   sum:"Sentient alien organism transmitted through ocular contact. Capable of full host possession. Found in downed WWII aircraft — Pacific theater. Connected to Syndicate colonization agenda. THE ALIEN OIL IS THE KEY."},
  {id:"X-File 7777",title:"COLONIZATION",cls:"CONSPIRACY / EXTRATERRESTRIAL",sub:"MYTHOLOGY ARC",col:0x00cc44,
   sum:"Planned alien colonization of Earth. Syndicate collaborated since Roswell 1947. Smallpox genome catalogued for compatibility testing. Bees used as vectors. Black cancer = advance scout organism. Rebel alien resistance exists."},
  {id:"X-File 2231",title:"DUANE BARRY / ASCENSION",cls:"ABDUCTION",sub:"Case 2.05-2.06",col:0xff3333,
   sum:"Former FBI agent reported repeated alien abductions. Metallic implants found — non-terrestrial origin confirmed by Scully. Barry abducted Scully from her apartment. Scully missing 84 days. NO OFFICIAL EXPLANATION."},
  {id:"X-File 3301",title:"PUSHER — ROBERT MODELL",cls:"PSI PHENOMENON",sub:"Case 3.17",col:0xffcc00,
   sum:"Subject demonstrated ability to impose his will through spoken word — victims complied fatally. Caused multiple suicides via phone calls. Low-grade brain tumor believed source of abilities. Mulder resisted psionic control during confrontation."},
  {id:"X-File 5512",title:"HOME",cls:"HUMAN ABERRATION",sub:"Case 4.02",col:0xcc0000,
   sum:"Peaceville, PA. Peacock family — severely inbred across multiple generations. Quadruple amputee matriarch concealed beneath floorboards. One infant corpse recovered from field. Peacocks fled — LOCATION UNKNOWN. File sealed by Skinner."},
  {id:"X-File 6601",title:"THE SMOKING MAN",cls:"CLASSIFIED — DO NOT DISTRIBUTE",sub:"C.G.B. SPENDER",col:0x9900cc,
   sum:"Known alias: Cancer Man. Orchestrator of UFO crash cover-ups since 1952. Involvement in JFK assassination suspected. Controls DOD and CIA black budgets. Syndicate connection confirmed. Present at Mulder's father's death. MOTIVE UNKNOWN."},
  {id:"X-File 9002",title:"JOSE CHUNG'S FROM OUTER SPACE",cls:"CONFLICTING ACCOUNTS",sub:"Case 3.20",col:0x00aaff,
   sum:"Three witnesses. Three entirely different abduction accounts. Men in Black involvement — one confirmed NOT human. Air Force hypnotic regression used on civilians. Lord Kinbote referenced by unconnected sources. Truth: indeterminate."},
  {id:"X-File 0001",title:"PILOT — BELLEFLEUR, OREGON",cls:"INITIAL X-FILE",sub:"Case 1.01",col:0xffcc00,
   sum:"First documented case. Four teens found dead — radiation burns and anomalous implants. Nine minutes of missing time experienced by Mulder and Scully. Evidence incinerated by unknown party. This case opened the X-Files."},
  {id:"X-File 4400",title:"SAMANTHA MULDER",cls:"PERSONAL / UNRESOLVED",sub:"ONGOING",col:0xff3333,
   sum:"Sister of Agent Fox Mulder. Abducted November 27, 1973 at age 8. Government used her as leverage against Bill Mulder. Multiple Samantha clones terminated. Walk-ins theory: soul taken to spare further experimentation. CASE REMAINS OPEN."},
];

// ── RENDERER ──────────────────────────────────────────────────────────────
const renderer=new THREE.WebGLRenderer({antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputEncoding=THREE.LinearEncoding;
document.body.appendChild(renderer.domElement);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x1a1208);
scene.fog=new THREE.FogExp2(0x0d0a06,0.06);

const camera=new THREE.PerspectiveCamera(72,innerWidth/innerHeight,0.05,60);
camera.position.set(0,1.6,3);

// ── LIGHTS ────────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x998866,2.0));
const L=(c,i,d,x,y,z)=>{const l=new THREE.PointLight(c,i,d);l.position.set(x,y,z);scene.add(l);return l;};
L(0xccddaa,3.0,16, 0,2.8,0);
L(0xbbcc99,2.0,10,-2,2.8,-1);
L(0xffdd88,2.5,7,  1.5,1.3,1.8);
L(0xffeecc,3.0,10, 0,2.6,-2);
L(0xff8822,2.0,5,  2,0.5,2);
const flickerLight=L(0xccddaa,2.5,14, 0,2.8,0);

// ── GEOMETRY HELPERS ──────────────────────────────────────────────────────
const lam=(c,opts={})=>new THREE.MeshLambertMaterial({color:c,...opts});
const bas=(c,opts={})=>new THREE.MeshBasicMaterial({color:c,...opts});

function B(w,h,d,mat,x,y,z,ry=0){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),
    typeof mat==='number'?lam(mat):mat);
  m.position.set(x,y,z); m.rotation.y=ry; scene.add(m); return m;
}
function C(r,h,mat,x,y,z,s=12){
  const m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s),
    typeof mat==='number'?lam(mat):mat);
  m.position.set(x,y,z); scene.add(m); return m;
}
function P(w,h,mat,x,y,z,rx=-Math.PI/2,ry=0){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(w,h),
    typeof mat==='number'?lam(mat,{side:THREE.DoubleSide}):mat);
  m.position.set(x,y,z); m.rotation.set(rx,ry,0); scene.add(m); return m;
}

// ── ROOM ──────────────────────────────────────────────────────────────────
P(10,12,0x2a1f0e, 0,0,0);           // floor
B(10,0.05,12,0x1c1812, 0,3.02,0);   // ceiling
B(10,3.1,0.08,0x3d2c18, 0,1.55,-4.04); // back wall
B(10,3.1,0.08,0x352a15, 0,1.55,4.04);  // front wall
B(0.08,3.1,12,0x302615,-5.04,1.55,0);  // left wall
B(0.08,3.1,12,0x302615, 5.04,1.55,0);  // right wall
// Floor planks
for(let i=-4.5;i<5;i+=0.7)B(10,0.005,0.03,0x1a1005,0,0.005,i);

// ── CORKBOARD ─────────────────────────────────────────────────────────────
B(8.2,2.8,0.06,0x9B7924, 0,1.7,-3.97);
B(8.4,0.12,0.1,0x3a2800, 0,3.06,-3.95);
B(8.4,0.12,0.1,0x3a2800, 0,0.34,-3.95);
B(0.12,2.8,0.1,0x3a2800,-4.14,1.7,-3.95);
B(0.12,2.8,0.1,0x3a2800, 4.14,1.7,-3.95);

// ── BOARD TITLE ───────────────────────────────────────────────────────────
(()=>{
  const c=document.createElement('canvas');c.width=1024;c.height=56;
  const x=c.getContext('2d');
  x.fillStyle='#cc9900';x.font='bold 26px Courier New';x.textAlign='center';
  x.fillText('THE X-FILES — CLASSIFIED CASE BOARD',512,38);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(6.5,0.35),
    bas(0xffffff,{map:new THREE.CanvasTexture(c),transparent:true}));
  m.position.set(0,3.08,-3.9);scene.add(m);
})();

// ── CASE CARDS ────────────────────────────────────────────────────────────
const cardMeshes=[];
const positions=[
  [-3.2,2.55],[-1.6,2.6],[0.1,2.65],[1.8,2.55],[3.1,2.5],
  [-3.0,1.8],[-1.0,1.75],[0.8,1.85],[2.5,1.8],
  [-2.0,1.1],[0.5,1.05]
];
const pinPalette=[0xff2222,0xffdd00,0xff6600,0x22ffaa,0xff22cc,0x2288ff];

CASES.forEach((c,i)=>{
  const [px,py]=positions[i];
  const rot=(Math.random()-0.5)*0.12;

  // Card canvas texture
  const cv=document.createElement('canvas');cv.width=256;cv.height=180;
  const cx=cv.getContext('2d');
  cx.fillStyle='#ede5c8';cx.fillRect(0,0,256,180);
  cx.strokeStyle='#ccc0a0';cx.lineWidth=0.8;
  for(let l=28;l<180;l+=18){cx.beginPath();cx.moveTo(8,l);cx.lineTo(248,l);cx.stroke();}
  cx.save();cx.globalAlpha=0.3;cx.fillStyle='#cc0000';
  cx.font='bold 20px Courier New';cx.translate(128,90);cx.rotate(-0.22);
  cx.fillText('CLASSIFIED',−60,0);cx.restore();
  cx.fillStyle='#555';cx.font='10px Courier New';cx.fillText(c.id,10,20);
  cx.fillStyle='#111';cx.font='bold 12px Courier New';
  cx.fillText(c.title.length>20?c.title.slice(0,18)+'..':c.title,10,46);
  cx.fillStyle='#556600';cx.font='9px Courier New';
  cx.fillText(c.cls.length>26?c.cls.slice(0,24)+'..':c.cls,10,62);
  cx.fillStyle='#1a1a2a';cx.fillRect(10,74,68,52);
  cx.fillStyle='#664400';cx.font='9px Courier New';cx.fillText(c.sub,86,96);

  const mat=bas(0xffffff,{map:new THREE.CanvasTexture(cv),transparent:false});
  const mesh=new THREE.Mesh(new THREE.BoxGeometry(0.52,0.37,0.018),mat);
  mesh.position.set(px,py,-3.88);
  mesh.rotation.z=rot;
  mesh.userData={caseIndex:i};
  scene.add(mesh);
  cardMeshes.push(mesh);

  // Pin
  const pin=new THREE.Mesh(new THREE.SphereGeometry(0.018,8,8),
    lam(pinPalette[i%pinPalette.length]));
  pin.position.set(px,py+0.205,-3.865);
  scene.add(pin);
});

// ── STRINGS ───────────────────────────────────────────────────────────────
const connects=[[0,2],[2,3],[1,4],[4,7],[3,6],[0,5],[6,9],[5,10],[7,8],[1,6]];
const strCols=[0xff2222,0xff6600,0xcc0000,0xff4400,0xdd1111,0xff3300];
connects.forEach(([a,b],i)=>{
  const pa=positions[a],pb=positions[b];
  const pts=[
    new THREE.Vector3(pa[0],pa[1]-0.15,-3.875),
    new THREE.Vector3((pa[0]+pb[0])/2,(pa[1]+pb[1])/2-0.08,-3.875),
    new THREE.Vector3(pb[0],pb[1]-0.15,-3.875)
  ];
  const curve=new THREE.QuadraticBezierCurve3(...pts);
  const geo=new THREE.BufferGeometry().setFromPoints(curve.getPoints(20));
  scene.add(new THREE.Line(geo,new THREE.LineBasicMaterial({color:strCols[i%6],opacity:0.85,transparent:true})));
});

// ── DESK ──────────────────────────────────────────────────────────────────
B(2.2,0.06,0.9,0x2a1f0e, 1.5,0.82,2);
[[0.45,1.6],[2.55,1.6],[0.45,2.4],[2.55,2.4]].forEach(([x,z])=>B(0.06,0.82,0.06,0x1a1208,x,0.41,z));
B(0.35,0.04,0.28,0xe8e0cc,0.7,0.87,2.1);
B(0.35,0.04,0.28,0xd4ccb8,0.72,0.91,2.08);
B(0.35,0.04,0.28,0xc8c0a8,0.69,0.95,2.12);
// Monitor
B(0.45,0.35,0.35,0xccccaa,1.5,1.0,1.72);
B(0.35,0.28,0.02,0x001400,1.5,1.02,1.535);
(()=>{
  const c=document.createElement('canvas');c.width=256;c.height=192;
  const x=c.getContext('2d');
  x.fillStyle='#001400';x.fillRect(0,0,256,192);
  x.fillStyle='#00ff41';x.font='12px Courier New';
  ['FBI DATABASE','> ACCESS GRANTED','> SEARCHING...','','CLASSIFIED'].forEach((t,i)=>x.fillText(t,10,28+i*22));
  const m=new THREE.Mesh(new THREE.PlaneGeometry(0.34,0.27),
    bas(0xffffff,{map:new THREE.CanvasTexture(c)}));
  m.position.set(1.5,1.02,1.528);scene.add(m);
})();
C(0.02,0.5,0x888888,1.5,1.07,1.65,6);
new THREE.Mesh(new THREE.SphereGeometry(0.07,8,8),bas(0xffee99,{color:0xffee99}));
C(0.04,0.1,0x1a1a1a,2.1,0.87,2.2,8);
// Chair
C(0.22,0.04,0x111111,1.5,0.48,2.9,12);
C(0.03,0.44,0x444444,1.5,0.24,2.9);
B(0.44,0.44,0.06,0x111111,1.5,0.68,3.1);

// ── FILING CABINETS ───────────────────────────────────────────────────────
B(0.55,1.3,0.5,0x4a4a44,-3.8,0.65,-2);
B(0.55,1.3,0.5,0x4a4a44,-3.8,0.65,-0.8);
[[-2,0.9],[-2,0.55],[-0.8,0.9],[-0.8,0.55]].forEach(([z,y])=>B(0.15,0.02,0.02,0x888888,-3.53,y,z));

// ── BOOKSHELF ─────────────────────────────────────────────────────────────
B(1.2,1.8,0.3,0x2a1a08,4.4,0.9,1);
[0x8b0000,0x003366,0x2d4a00,0x4a3000,0x660033,0x1a1a44,0x442200,0x003322].forEach((c,i)=>{
  B(0.07+Math.random()*0.04,0.26+Math.random()*0.1,0.22,c,4.05+i*0.148,1.16+Math.random()*0.04,1);
});

// ── I WANT TO BELIEVE POSTER ──────────────────────────────────────────────
B(0.8,1.1,0.02,0x000011,-3.49,1.9,-2.8,Math.PI/2);
const ufoMesh=new THREE.Mesh(new THREE.SphereGeometry(0.18,12,6),lam(0x6644cc,{emissive:new THREE.Color(0x221188)}));
ufoMesh.scale.set(1.8,0.4,0.9);ufoMesh.position.set(-3.49,2.05,-2.8);ufoMesh.rotation.y=Math.PI/2;scene.add(ufoMesh);
(()=>{
  const c=document.createElement('canvas');c.width=256;c.height=48;
  const x=c.getContext('2d');x.fillStyle='#fff';x.font='bold 16px Courier New';x.textAlign='center';
  x.fillText('I WANT TO BELIEVE',128,32);
  const m=new THREE.Mesh(new THREE.PlaneGeometry(0.72,0.16),bas(0xffffff,{map:new THREE.CanvasTexture(c),transparent:true}));
  m.position.set(-3.49,1.48,-2.8);m.rotation.y=Math.PI/2;scene.add(m);
})();

// ── CAMPFIRE ──────────────────────────────────────────────────────────────
C(0.25,0.05,0x2a1505,2,0.025,2,10);
const fireMesh=new THREE.Mesh(new THREE.ConeGeometry(0.18,0.38,8),
  lam(0xff6600,{transparent:true,opacity:0.9,emissive:new THREE.Color(0xcc2200)}));
fireMesh.position.set(2,0.22,2);scene.add(fireMesh);

// ── FLUORESCENT TUBES ─────────────────────────────────────────────────────
[-2,2].forEach(x=>B(1.4,0.05,0.1,bas(0xccffcc),x,2.98,0));

// ── CONTROLS ──────────────────────────────────────────────────────────────
const keys={};let mx=false,pitch=0,yaw=0;

document.getElementById('startBtn').onclick=()=>{
  document.getElementById('overlay').style.display='none';
  renderer.domElement.requestPointerLock();
};
document.addEventListener('pointerlockchange',()=>{ mx=!!document.pointerLockElement; });
document.addEventListener('keydown',e=>keys[e.code]=true);
document.addEventListener('keyup',  e=>keys[e.code]=false);
document.addEventListener('mousemove',e=>{
  if(!mx)return;
  yaw  -=e.movementX*0.002;
  pitch =Math.max(-1.4,Math.min(1.4,pitch-e.movementY*0.002));
});

// Click to open card
const ray=new THREE.Raycaster();
document.addEventListener('click',()=>{
  if(!mx)return;
  ray.setFromCamera(new THREE.Vector2(0,0),camera);
  const hits=ray.intersectObjects(cardMeshes);
  if(hits.length){openPanel(hits[0].object.userData.caseIndex);}
});
document.addEventListener('keydown',e=>{ if(e.code==='Escape')closePanel(); });

function openPanel(i){
  const c=CASES[i];
  document.getElementById('cp-cls').textContent='⚠ '+c.cls+' ⚠';
  document.getElementById('cp-id').textContent=c.id;
  document.getElementById('cp-ttl').textContent=c.title;
  document.getElementById('cp-sum').textContent=c.sum;
  document.getElementById('case-panel').style.display='block';
  document.exitPointerLock();mx=false;
}
function closePanel(){
  document.getElementById('case-panel').style.display='none';
  renderer.domElement.requestPointerLock();
}

// ── LOOP ──────────────────────────────────────────────────────────────────
const clock=new THREE.Clock();
const fwd=new THREE.Vector3(),rgt=new THREE.Vector3(),mov=new THREE.Vector3();

(function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.getElapsedTime();

  camera.rotation.order='YXZ';
  camera.rotation.y=yaw;
  camera.rotation.x=pitch;

  if(mx){
    fwd.set(Math.sin(yaw),0,Math.cos(yaw));
    rgt.set(Math.cos(yaw),0,-Math.sin(yaw));
    mov.set(0,0,0);
    if(keys['KeyW']||keys['ArrowUp'])    mov.sub(fwd);
    if(keys['KeyS']||keys['ArrowDown'])  mov.add(fwd);
    if(keys['KeyA']||keys['ArrowLeft'])  mov.sub(rgt);
    if(keys['KeyD']||keys['ArrowRight']) mov.add(rgt);
    if(mov.lengthSq()>0){
      mov.normalize().multiplyScalar(3.5*dt);
      camera.position.addScaledVector(mov,1);
      camera.position.x=Math.max(-4.5,Math.min(4.5,camera.position.x));
      camera.position.z=Math.max(-3.5,Math.min(3.8,camera.position.z));
      camera.position.y=1.6;
    }
  }

  // Animations
  ufoMesh.position.y=2.05+Math.sin(t*1.1)*0.05;
  fireMesh.scale.set(0.9+Math.sin(t*9)*0.12,1+Math.sin(t*11)*0.15,0.9+Math.cos(t*7)*0.1);
  flickerLight.intensity=2.2+Math.sin(t*57)*0.12+Math.sin(t*93)*0.06;

  renderer.render(scene,camera);
})();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
</body>
</html>
