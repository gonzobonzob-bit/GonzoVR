<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>X-FILES VR</title>
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="movement.js"></script>
<style>
body{margin:0;background:#000;}
#panel{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:500px;max-width:92vw;background:rgba(3,10,3,0.97);
  border:2px solid #00ff41;padding:26px;display:none;z-index:200;
  font-family:'Courier New',monospace;color:#aaffaa;}
#panel .pid{color:#88ff88;font-size:11px;margin-bottom:4px;}
#panel .pcls{color:#ff3333;font-size:11px;margin-bottom:12px;letter-spacing:2px;}
#panel h2{color:#fff;font-size:20px;letter-spacing:2px;margin:6px 0 14px;}
#panel .div{height:1px;background:#003300;margin-bottom:12px;}
#panel p{font-size:12px;line-height:1.85;margin-bottom:18px;}
#panel button{background:transparent;border:1px solid #00ff41;color:#00ff41;
  font-family:'Courier New',monospace;font-size:11px;letter-spacing:3px;
  padding:12px 24px;cursor:pointer;width:100%;}
#hud{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  color:#00ff41;font-family:'Courier New',monospace;font-size:10px;letter-spacing:2px;
  background:rgba(0,0,0,0.7);padding:7px 16px;border:1px solid #003300;
  pointer-events:none;z-index:100;white-space:nowrap;}
</style>
</head>
<body>
<div id="hud">LEFT STICK=MOVE &nbsp; RIGHT STICK=TURN &nbsp; AIM+TRIGGER=READ CARD</div>
<div id="panel">
  <div class="pid" id="pid"></div>
  <div class="pcls" id="pcls"></div>
  <h2 id="pttl"></h2>
  <div class="div"></div>
  <p id="psum"></p>
  <button onclick="document.getElementById('panel').style.display='none'">[ CLOSE FILE ]</button>
</div>

<script>
const CASES=[
  {id:"X-File 1013",title:"EUGENE VICTOR TOOMS",cls:"UNNATURAL BIOLOGY",
   sum:"Subject possesses retractable skeletal structure allowing ingress through small apertures. Hibernates 30-year cycles. Harvests human livers. Kill count: 5 per cycle since 1903. DO NOT ENGAGE ALONE."},
  {id:"X-File 1214",title:"THE FLUKEMAN",cls:"PARASITIC ENTITY",
   sum:"Humanoid fluke worm from Chernobyl sewage. Reproduces via larvae through bite. Believed destroyed — unconfirmed. Connection to DOD suppressed."},
  {id:"X-File 0467",title:"BLACK OIL",cls:"EXTRATERRESTRIAL PATHOGEN",
   sum:"Sentient alien organism. Transmitted via ocular contact — full host possession. Found in downed WWII aircraft. Connected to Syndicate colonization agenda."},
  {id:"X-File 7777",title:"COLONIZATION",cls:"CONSPIRACY / EXTRATERRESTRIAL",
   sum:"Planned alien colonization. Syndicate collaborated since Roswell 1947. Smallpox catalogued for compatibility. Bees as vectors. Rebel alien resistance confirmed."},
  {id:"X-File 2231",title:"DUANE BARRY",cls:"ABDUCTION",
   sum:"Former FBI agent. Repeated alien abductions. Metallic implants — non-terrestrial. Barry abducted Scully from her apartment. Missing 84 days. NO EXPLANATION."},
  {id:"X-File 3301",title:"PUSHER",cls:"PSI PHENOMENON",
   sum:"Robert Modell imposed will through spoken word — victims complied fatally. Brain tumor source of abilities. Mulder resisted psionic control."},
  {id:"X-File 5512",title:"HOME",cls:"HUMAN ABERRATION",
   sum:"Peaceville PA. Peacock family — severely inbred. Amputee matriarch under floorboards. One infant corpse. Peacocks fled — LOCATION UNKNOWN."},
  {id:"X-File 6601",title:"THE SMOKING MAN",cls:"CLASSIFIED",
   sum:"Cancer Man. UFO cover-ups since 1952. JFK involvement suspected. Controls DOD and CIA black budgets. Present at Mulder's father's death."},
  {id:"X-File 0001",title:"PILOT — BELLEFLEUR",cls:"INITIAL X-FILE",
   sum:"First case. Four teens dead — radiation burns and implants. Nine minutes missing time. Evidence incinerated. This case opened the X-Files."},
  {id:"X-File 4400",title:"SAMANTHA MULDER",cls:"PERSONAL / UNRESOLVED",
   sum:"Mulder's sister. Abducted November 27 1973, age 8. Used as leverage. Multiple clones terminated. Walk-ins theory. CASE REMAINS OPEN."},
  {id:"X-File 9002",title:"JOSE CHUNG",cls:"CONFLICTING ACCOUNTS",
   sum:"Three witnesses, three different accounts. Men in Black — one NOT human. Lord Kinbote referenced by unconnected sources. Truth: indeterminate."},
];
function openCase(i){
  const c=CASES[i];
  document.getElementById('pid').textContent=c.id;
  document.getElementById('pcls').textContent='⚠ '+c.cls+' ⚠';
  document.getElementById('pttl').textContent=c.title;
  document.getElementById('psum').textContent=c.sum;
  document.getElementById('panel').style.display='block';
}
window.openCase=openCase;
</script>

<script>
// Right trigger reads card
document.addEventListener('DOMContentLoaded', () => {
  document.querySelector('a-scene').addEventListener('loaded', () => {
    const rhand = document.getElementById('rhand');
    rhand.addEventListener('triggerdown', () => {
      const rc = rhand.components['raycaster'];
      if (!rc) return;
      const els = rc.intersectedEls;
      if (els.length > 0) els[0].click();
    });
  });
});
</script>
