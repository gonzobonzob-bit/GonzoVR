    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    color: #00ff41; font-family: 'Courier New', monospace; font-size: 11px;
    text-align: center; pointer-events: none; z-index: 100;

<a-scene
  vr-mode-ui="enabled: true"
  renderer="antialias: true; colorManagement: false"
  background="color: #1a1008"
  loading-screen="enabled: false"
  id="scene"
>

  <!-- ─── ASSETS ─────────────────────────────────────────────────────────── -->

    <!-- Generate procedural textures via canvas -->
    <canvas id="floor-canvas" width="512" height="512"></canvas>
    <canvas id="wall-canvas" width="512" height="512"></canvas>
    <canvas id="cork-canvas" width="1024" height="768"></canvas>
    <canvas id="desk-canvas" width="256" height="256"></canvas>
    <canvas id="poster-canvas" width="256" height="384"></canvas>

  <!-- ─── CAMERA RIG ─────────────────────────────────────────────────────── -->

    <a-entity
      id="camera"
      camera="fov: 75; near: 0.1"
      look-controls="pointerLockEnabled: false"
      wasd-controls="enabled: true; acceleration: 10"
      position="0 1.6 0"
    >
      <!-- Gaze cursor for non-VR -->
      <a-entity
        cursor="fuse: false; rayOrigin: mouse"
        raycaster="objects: .interactive; far: 10"
        geometry="primitive: ring; radiusInner: 0.01; radiusOuter: 0.015"
        material="color: #00ff41; shader: flat; opacity: 0.8"
        position="0 0 -1"
      ></a-entity>
    </a-entity>

    <!-- Left Controller -->
    <a-entity
      id="left-ctrl"
      oculus-touch-controls="hand: left"
      teleport-controls="cameraRig: #rig; teleportOrigin: #camera; button: thumbstick; curveColor: #00ff41; landingNormal: 0 1 0; landingMaxAngle: 45; hitCylinderColor: #00ff41"
    ></a-entity>

    <!-- Right Controller — raycaster for interaction -->
    <a-entity
      id="right-ctrl"
      oculus-touch-controls="hand: right"
      raycaster="objects: .interactive; far: 8; showLine: true; lineColor: #00ff41; lineOpacity: 0.5"

  <!-- ─── AMBIENT PARTICLE (floating dust) ──────────────────────────────── -->
  <!-- Small floating spheres for atmosphere -->
  <a-sphere radius="0.005" position="0.5 1.8 -2" material="color: #ffdd88; emissive: #ffcc44; emissiveIntensity: 0.3; opacity: 0.5; transparent: true"
    animation="property: position; to: 0.6 2.1 -2.1; dur: 6000; dir: alternate; easing: easeInOutSine; loop: true"></a-sphere>
  <a-sphere radius="0.004" position="-1 1.5 -1" material="color: #ffdd88; emissive: #ffcc44; emissiveIntensity: 0.3; opacity: 0.4; transparent: true"
    animation="property: position; to: -0.9 1.9 -1.2; dur: 8000; dir: alternate; easing: easeInOutSine; loop: true"></a-sphere>
  <a-sphere radius="0.003" position="1.5 1.2 -3" material="color: #aaddff; emissive: #88bbff; emissiveIntensity: 0.4; opacity: 0.3; transparent: true"
    animation="property: position; to: 1.6 1.6 -2.8; dur: 7000; dir: alternate; easing: easeInOutSine; loop: true"></a-sphere>

</a-scene>

<script>
// ─── BUILD CORKBOARD CARDS ────────────────────────────────────────────────────
const scene = document.querySelector('a-scene');

scene.addEventListener('loaded', () => {
  buildCorkboard();
  setupInteraction();
  setupAudio();
});

function buildCorkboard() {
  const container = document.getElementById('corkboard-cards');
  const boardW = 7.6;  // usable board width
  const boardH = 2.4;  // usable board height
  const boardZ = -3.88;
  const boardCenterX = 0;
  const boardCenterY = 1.7;

  // Pre-defined positions spread across the board
  const positions = [
    [-3.2, 2.5], [-1.6, 2.6], [0.1, 2.7], [1.8, 2.5], [3.1, 2.4],
    [-3.0, 1.8], [-1.0, 1.7], [0.8, 1.9], [2.5, 1.8], [3.2, 1.5],
    [-2.0, 1.1]
  ];

  const strings = [];

  CASES.forEach((c, i) => {
    const px = positions[i][0];
    const py = positions[i][1];
    const pz = boardZ + 0.02;
    const rot = (Math.random() - 0.5) * 8; // slight random tilt

    // Card entity
    const card = document.createElement('a-entity');
    card.setAttribute('class', 'interactive case-card');
    card.setAttribute('position', `${px} ${py} ${pz}`);
    card.setAttribute('rotation', `0 0 ${rot}`);
    card.dataset.caseIndex = i;

    // Card background (aged paper)
    const bg = document.createElement('a-plane');
    bg.setAttribute('width', '0.52');
    bg.setAttribute('height', '0.36');
    bg.setAttribute('material', 'color: #f0e8cc; roughness: 1; side: double');
    card.appendChild(bg);

    // Aged paper texture line
    const line1 = document.createElement('a-plane');
    line1.setAttribute('width', '0.48');
    line1.setAttribute('height', '0.003');
    line1.setAttribute('position', '0 0.1 0.001');
    line1.setAttribute('material', 'color: #ccbbaa; opacity: 0.4; transparent: true');
    card.appendChild(line1);

    // Classification stamp (red diagonal text feel)
    const stamp = document.createElement('a-text');
    stamp.setAttribute('value', 'CLASSIFIED');
    stamp.setAttribute('color', '#cc0000');
    stamp.setAttribute('width', '0.9');
    stamp.setAttribute('position', '0 0.12 0.002');
    stamp.setAttribute('align', 'center');
    stamp.setAttribute('rotation', '0 0 -12');
    stamp.setAttribute('font', 'monoid');
    card.appendChild(stamp);

    // Case ID
    const caseId = document.createElement('a-text');
    caseId.setAttribute('value', c.id);
    caseId.setAttribute('color', '#333333');
    caseId.setAttribute('width', '0.8');
    caseId.setAttribute('position', '-0.22 0.14 0.003');
    caseId.setAttribute('align', 'left');
    caseId.setAttribute('font', 'monoid');
    card.appendChild(caseId);

    // Case title
    const title = document.createElement('a-text');
    title.setAttribute('value', c.title.length > 20 ? c.title.substring(0,18)+'..' : c.title);
    title.setAttribute('color', '#111111');
    title.setAttribute('width', '1.1');
    title.setAttribute('position', '0 0.04 0.003');
    title.setAttribute('align', 'center');
    title.setAttribute('font', 'monoid');
    card.appendChild(title);

    // Classification type
    const classif = document.createElement('a-text');
    classif.setAttribute('value', c.classification.length > 22 ? c.classification.substring(0,20)+'..' : c.classification);
    classif.setAttribute('color', '#555500');
    classif.setAttribute('width', '0.85');
    classif.setAttribute('position', '0 -0.05 0.003');
    classif.setAttribute('align', 'center');
    classif.setAttribute('font', 'monoid');
    card.appendChild(classif);

    // Photo placeholder (dark rectangle suggesting evidence photo)
    const photo = document.createElement('a-plane');
    photo.setAttribute('width', '0.14');
    photo.setAttribute('height', '0.10');
    photo.setAttribute('position', '-0.16 -0.13 0.002');
    photo.setAttribute('material', `color: ${['#1a1a2a','#1a2a1a','#2a1a1a','#1a1a1a'][i%4]}; roughness: 1`);
    card.appendChild(photo);

    // Subtitle
    const sub = document.createElement('a-text');
    sub.setAttribute('value', c.subtitle);
    sub.setAttribute('color', '#666633');
    sub.setAttribute('width', '0.7');
    sub.setAttribute('position', '0.04 -0.12 0.003');
    sub.setAttribute('align', 'left');
    sub.setAttribute('font', 'monoid');
    card.appendChild(sub);

    // Hover glow plane (initially invisible)
    const glow = document.createElement('a-plane');
    glow.setAttribute('class', 'card-glow');
    glow.setAttribute('width', '0.56');
    glow.setAttribute('height', '0.40');
    glow.setAttribute('position', '0 0 -0.002');
    glow.setAttribute('material', `color: ${c.string}; opacity: 0; transparent: true; side: double`);
    card.appendChild(glow);

    // Thumbtack pin (top center)
    const pin = document.createElement('a-sphere');
    pin.setAttribute('radius', '0.012');
    pin.setAttribute('position', `0 0.2 0.015`);
    pin.setAttribute('material', `color: ${PIN_COLORS[i % PIN_COLORS.length]}; roughness: 0.3; metalness: 0.7`);
    card.appendChild(pin);

    container.appendChild(card);
    strings.push({ from: [px, py - 0.18], index: i });
  });

  // ─── RED STRINGS ─────────────────────────────────────────────────────────
  // Connect some cards with red string lines
  const connections = [
    [0, 2], [2, 3], [1, 4], [4, 7], [3, 6], [0, 5],
    [6, 9], [5, 10], [7, 8], [1, 6], [3, 9], [2, 10]
  ];

  connections.forEach(([a, b]) => {
    const pa = positions[a];
    const pb = positions[b];
    const midX = (pa[0] + pb[0]) / 2;
    const midY = (pa[1] + pb[1]) / 2;
    const dx = pb[0] - pa[0];
    const dy = pb[1] - pa[1];
    const length = Math.sqrt(dx*dx + dy*dy);
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    const stringColor = CASES[a].string;

    const line = document.createElement('a-box');
    line.setAttribute('width', length.toFixed(3));
    line.setAttribute('height', '0.004');
    line.setAttribute('depth', '0.003');
    line.setAttribute('position', `${midX} ${midY} ${boardZ + 0.035}`);
    line.setAttribute('rotation', `0 0 ${angle}`);
    line.setAttribute('material', `color: ${stringColor}; roughness: 1; opacity: 0.85; transparent: true`);
    container.appendChild(line);
  });
}

// ─── CARD INTERACTION ─────────────────────────────────────────────────────────
function setupInteraction() {
  const cardReader = document.getElementById('card-reader');
  const cardHeader = document.getElementById('card-header');
  const cardClass = document.getElementById('card-class');
  const cardId = document.getElementById('card-id');
  const cardTitle = document.getElementById('card-title');
  const cardSummary = document.getElementById('card-summary');

  let readerOpen = false;
  let lastHovered = null;

  // Mouse / gaze hover
  document.querySelectorAll('.case-card').forEach(card => {
    card.addEventListener('mouseenter', () => highlightCard(card, true));
    card.addEventListener('mouseleave', () => highlightCard(card, false));
    card.addEventListener('click', () => openCard(card));
  });

  // VR controller interaction (raycaster hit)
  const scene = document.querySelector('a-scene');
  scene.addEventListener('click', (e) => {
    const target = e.detail?.intersection?.object?.el;
    if (!target) return;
    const card = target.closest ? target.closest('.case-card') : target.parentEl;
    if (card && card.classList.contains('case-card')) {
      openCard(card);
    }
    if (readerOpen) {
      // close on trigger when reader open
      closeReader();
    }
  });

  function highlightCard(card, on) {
    const glow = card.querySelector('.card-glow');
    if (glow) glow.setAttribute('material', `color: ${CASES[card.dataset.caseIndex].string}; opacity: ${on ? 0.35 : 0}; transparent: true; side: double`);
    card.setAttribute('scale', on ? '1.05 1.05 1.05' : '1 1 1');
  }

  function openCard(card) {
    if (readerOpen) { closeReader(); return; }
    const c = CASES[parseInt(card.dataset.caseIndex)];
    if (!c) return;

    cardId.setAttribute('value', c.id);
    cardTitle.setAttribute('value', c.title);
    cardClass.setAttribute('value', '⚠ ' + c.classification + ' ⚠');
    cardSummary.setAttribute('value', c.summary);

    // Position reader in front of camera
    const cam = document.getElementById('camera');
    const camPos = cam.getAttribute('position');
    const rigPos = document.getElementById('rig').getAttribute('position');
    cardReader.setAttribute('position', `${rigPos.x} ${camPos.y + rigPos.y} ${rigPos.z - 1.5}`);

    cardReader.setAttribute('visible', 'true');
    cardReader.setAttribute('animation', 'property: scale; from: 0.1 0.1 0.1; to: 1 1 1; dur: 200; easing: easeOutBack');
    readerOpen = true;
  }

  function closeReader() {
    cardReader.setAttribute('animation', 'property: scale; from: 1 1 1; to: 0.01 0.01 0.01; dur: 150; easing: easeInBack');
    setTimeout(() => cardReader.setAttribute('visible', 'false'), 150);
    readerOpen = false;
  }

  // Keyboard close
  document.addEventListener('keydown', (e) => {
    if ((e.key === 'Escape' || e.key === 'e') && readerOpen) closeReader();
  });
}

// ─── AMBIENT AUDIO (Web Audio API) ────────────────────────────────────────────
function setupAudio() {
  let audioCtx = null;
  let started = false;

  function startAmbient() {
    if (started) return;
    started = true;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    // Eerie drone
    function playDrone(freq, gain, duration) {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(gain, audioCtx.currentTime + 2);
      gainNode.gain.linearRampToValueAtTime(0, audioCtx.currentTime + duration - 1);
      osc.start();
      osc.stop(audioCtx.currentTime + duration);
    }

    // Play layered eerie drones
    function ambientLoop() {
      playDrone(55, 0.03, 12);
      playDrone(82.4, 0.02, 10);
      playDrone(110, 0.015, 8);
      setTimeout(ambientLoop, 9000);
    }
    ambientLoop();

    // Occasional static crackle
    function crackle() {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.05, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.15;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.value = 0.08;
      src.connect(g);
      g.connect(audioCtx.destination);
      src.start();
      setTimeout(crackle, 3000 + Math.random() * 8000);
    }
    setTimeout(crackle, 2000);
  }

  // Start audio on first interaction
  document.addEventListener('click', startAmbient, { once: true });
  document.addEventListener('keydown', startAmbient, { once: true });
}

// ─── FLOOR GRID EFFECT ────────────────────────────────────────────────────────

    line.setAttribute('position', `${x} 0.002 0`);
    line.setAttribute('material', 'color: #003300; opacity: 0.3; transparent: true');
    scene2.appendChild(line);
  }
  for (let z = -5; z <= 5; z += 1) {
    const line = document.createElement('a-box');
    line.setAttribute('width', '10');
    line.setAttribute('height', '0.002');
    line.setAttribute('depth', '0.008');
    line.setAttribute('position', `0 0.002 ${z}`);
    line.setAttribute('material', 'color: #003300; opacity: 0.3; transparent: true');
    scene2.appendChild(line);
  }
});
</script>
